<!DOCTYPE html>
<html>
<head>
    <title>Delete Recipe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h3>Are you sure you want to delete "<strong>{{ recipe.sweetname }}</strong>"?</h3>
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background-color: #5E35B1;border: none;" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'recipe_list' %}" style="background-color: #9C27B0;border: none;" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
